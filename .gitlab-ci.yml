image: node:22-bookworm

stages:
  - test
  - quality

variables:
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"

cache:
  key:
    files:
      - tools/devctx/package-lock.json
  paths:
    - .npm/

default:
  before_script:
    - cd tools/devctx
    - npm ci

test:
  stage: test
  script:
    - npm test
    - npm run smoke:json
    - npm run smoke:formats

quality:
  stage: quality
  script:
    - npx --yes eslint@9 src/ scripts/
    - npm audit --audit-level=high || true
    - npm run benchmark:orchestration:release

name: refactor-safe
description: Curated context + outline reads + affected tests, ending with checkpoint
defaults:
  task: "Refactor target"
stopOnFail: true
steps:
  - tool: smart_context
    args:
      task: "{{args.task}}"
      intent: refactor
      detail: balanced
  - tool: smart_test
    args:
      action: affected
  - tool: smart_turn
    args:
      phase: end
      event: milestone
